# Report Configuration
report.base.dir=test-output/ExtentReports
report.file.prefix=Mobile_Automation_Report_
report.doc.title=Appium Mobile Automation Report
report.name=Detailed Mobile Test Execution Summary
report.theme=STANDARD
report.encoding=utf-8

# Screenshot Configuration
screenshot.capture.enabled=true
screenshot.base.dir=screenshots
screenshot.format=PNG
screenshot.timeout=5000

# Mobile Configuration
mobile.platform.default=Android
mobile.screenshot.quality=HIGH

# Cleanup Configuration
report.cleanup